{% extends "base.html" %}
{% block title %}Server Error - Campus Helpdesk{% endblock %}
{% block content %}
<div class="min-h-[50vh] flex items-center justify-center">
  <div class="text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-red-50 dark:bg-red-900/20 mb-6">
      <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <h1 class="text-6xl font-extrabold text-gradient mb-2">500</h1>
    <p class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">Something went wrong</p>
    <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-sm mx-auto">We're working on fixing this. Please try again later.</p>
    <a href="{{ url_for('dashboard') }}" class="inline-flex items-center gap-2 bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-medium rounded-xl px-6 py-3 shadow-lg shadow-brand-600/20 transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
