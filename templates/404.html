{% extends "base.html" %}
{% block title %}Page Not Found - Campus Helpdesk{% endblock %}
{% block content %}
<div class="min-h-[50vh] flex items-center justify-center">
  <div class="text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-amber-50 dark:bg-amber-900/20 mb-6">
      <svg class="w-10 h-10 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="text-6xl font-extrabold text-gradient mb-2">404</h1>
    <p class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">Page not found</p>
    <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-sm mx-auto">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('dashboard') }}" class="inline-flex items-center gap-2 bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-medium rounded-xl px-6 py-3 shadow-lg shadow-brand-600/20 transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
