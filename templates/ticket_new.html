{% extends "base.html" %}
{% block title %}New Ticket - Campus Helpdesk{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <!-- Breadcrumb -->
  <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-6">
    <a href="{{ url_for('dashboard') }}" class="hover:text-gray-900 dark:hover:text-gray-200 transition-colors">Dashboard</a>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-gray-900 dark:text-gray-100 font-medium">New Ticket</span>
  </nav>

  <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-card border border-gray-200/60 dark:border-gray-700/40 overflow-hidden">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-gray-200 dark:border-gray-700">
      <h1 class="text-xl font-bold">Submit a Ticket</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Describe your issue and we'll get back to you</p>
    </div>

    <form method="POST" class="p-6 space-y-5" enctype="multipart/form-data">
      <div>
        <label class="block text-sm font-medium mb-1.5">Title <span class="text-red-500">*</span></label>
        <input name="title" required
               class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-surface-900 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow"
               placeholder="Brief description of your issue" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">Description</label>
        <textarea name="description" rows="6"
                  class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-surface-900 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow resize-y"
                  placeholder="Provide as many details as possible to help us resolve your issue quickly..."></textarea>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">Priority</label>
          <select name="priority"
                  class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-surface-900 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
            <option>Low</option>
            <option selected>Medium</option>
            <option>High</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Attachment</label>
          <div class="relative">
            <input type="file" name="attachment"
                   class="w-full text-sm text-gray-500 dark:text-gray-400 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-surface-900 px-4 py-2
                          file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium
                          file:bg-brand-50 dark:file:bg-brand-900/30 file:text-brand-700 dark:file:text-brand-300
                          hover:file:bg-brand-100 dark:hover:file:bg-brand-900/50 cursor-pointer">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('dashboard') }}"
           class="px-5 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 text-sm font-medium text-center hover:bg-gray-50 dark:hover:bg-surface-700 transition-colors">
          Cancel
        </a>
        <button type="submit"
                class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-brand-600 to-brand-700 hover:from-brand-700 hover:to-brand-800 text-white font-medium text-sm shadow-lg shadow-brand-600/20 hover:shadow-brand-600/30 transition-all">
          Create Ticket
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
